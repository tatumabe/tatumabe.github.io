<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <link rel="stylesheet" type="text/css" href="style.css">
      <title>Bound Book Club | Subscribe to our Newsletter</title>
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
      <link rel="stylesheet" href="https://use.typekit.net/bje0hya.css">
   </head>
   <body>
      <div class="news">
         <header>
            <h1><a href="index.html"><img src="BoundBookClubLogo.svg" alt="Bound Book Club Logo"></a></h1>
            <nav>
               <ul>
                  <li><a href="#">About</a></li>
                  <li><a href="#">Top Picks</a></li>
                  <li><a href="#">Authors</a></li>
                  <li><a href="#">Reviews</a></li>
                  <li><a href="#">Join Us</a></li>
                  <li><a href="newsletter.html">Newsletter</a></li>
               </ul>
            </nav>
         </header>
         <main>
            <figure>
               <img src="subscribe.jpg" alt="Books arranged in a pattern.">
               <figcaption>A collection of featured books from past Bound Book Club newsletters</figcaption>
            </figure>
            <h2>Subscribe to our Newsletter</h2>
            <p>Get the latest updates and stories on our monthly favorites, author spotlights, and book reviews delivered straight to your inbox.</p>
            <form>
               <section class="personal-info">
                  <ul>
                     <li><label for="name">Name</label></li>
                     <li><input type="text" name="name" id="name" placeholder="Your Full Name"/></li>
                     <li><label for="email">Email</label></li>
                     <li><input type="email" name="email" id="email" placeholder="example@email.com"/></li>
                  </ul>
               </section>

               <section class="genres">
                   <h3>What genres are you interested in?</h3>
                   <ul>
                       <li><input type="checkbox" id="historical-fiction" value="historical-fiction" /><label for="historical-fiction"> Historical Fiction</label></li>
                       <li><input type="checkbox" id="fantasy" value="fantasy" /> <label for="fantasy">Fantasy</label></li>
                       <li><input type="checkbox" id="young-adult" value="young-adult" /> <label for="young-adult">Young Adult</label></li>
                       <li><input type="checkbox" id="thriller" value="thriller" /> <label for="thriller">Thriller</label></li>
                       <li><input type="checkbox" id="romance" value="romance" /> <label for="romance">Romance</label></li>
                       <li><input type="checkbox" id="mystery" value="mystery" /> <label for="mystery">Mystery</label></li>
                       <li><input type="checkbox" id="non-fiction" value="non-fiction" /> <label for="non-fiction">Non-fiction</label></li>
                       <li><input type="checkbox" id="fiction" value="fiction" /> <label for="fiction">Fiction</label></li>
                   </ul>
               </section>
               <section>
                   <button type="order">Sign me up!</button>
               </section>
           </form>
         </main>
         <footer>
            <p>All rights reserved.</p>
         </footer>
      </div>
   </body>
</html>
